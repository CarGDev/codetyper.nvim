name: Lua CI

on:
  push:
    branches: [master]
    paths:
      - "lua/**/*.lua"
      - "plugin/**/*.lua"
      - ".stylua.toml"
      - ".luacheckrc"
      - .github/workflows/lua.yaml
  pull_request:
    branches: [master]
    paths:
      - "lua/**/*.lua"
      - "plugin/**/*.lua"
      - ".stylua.toml"
      - ".luacheckrc"
      - .github/workflows/lua.yaml

jobs:
  format:
    name: StyLua auto-format
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: lua/ plugin/

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with stylua"
          file_pattern: "lua/**/*.lua plugin/**/*.lua"

  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ plugin/

  health:
    name: Plugin load check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Verify plugin loads
        run: |
          nvim --headless -u NONE \
            -c "set rtp+=." \
            -c "lua require('codetyper')" \
            -c "qa!" 2>&1
